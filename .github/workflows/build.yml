name: build docs
on: [push]
jobs:
  jekyll:
    runs-on: ubuntu-latest
    container:
      image: ruby:3.1.2
    steps:
      - uses: actions/checkout@v3
      - run: echo "Hello World!"
      - uses: ruby/setup-ruby@359bebbc29cbe6c87da6bc9ea3bc930432750108
        with:
          ruby-version: '3.1.2'
      - run: ruby --version
      - run: bundle --version
