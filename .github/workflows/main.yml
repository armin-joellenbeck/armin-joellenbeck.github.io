name: main
on:
  - push
jobs:
  ruby:
    strategy: 
      matrix:
        tool:
          - rspec
          - rubocop
        dir:
          - algebra
          - kanban
        include:
          - tool: rubocop
            dir: www
          - tool: jekyll build
            dir: www
    runs-on: ubuntu-latest
    env:
      GEMFILE_LOCK: ${{ matrix.dir }}/Gemfile.lock
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: setup ruby
        uses: ruby/setup-ruby@v1.112.0
        with:
          ruby-version: '3.1.2'
      - name: cache
        uses: actions/cache@v3
        with:
          path: ${{ matrix.dir }}/.bundle 
          key: ${{ hashFiles(env.GEMFILE_LOCK) }}
      - name: bundle exec ${{matrix.tool}}
        run: |
          cd ${{ matrix.dir }}
          bundle config set clean true
          bundle config set path .bundle
          bundle install
          bundle exec ${{matrix.tool}}
      - name: upload public
        uses: actions/upload-artifact@v3
        with:
          if-no-files-found: ignore
          name: artifacts
          path: '*/public'
  deploy:
    needs:
      - ruby
    if: ${{github.ref_name == 'main'}}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: downlod public
        uses: actions/download-artifact@v3
        with:
          name: artifacts
      - name: populate public
        run: |
          mkdir public
          touch public/.nojekyll
          # TODO for loop over paths ending with public
          cp -r www/public public/www
          mv public/www/* public
          rmdir public/www
      - name: deploy public 
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
