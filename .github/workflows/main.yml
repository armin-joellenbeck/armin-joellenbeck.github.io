name: main
on:
  - push
jobs:
  ruby:
    strategy: 
      matrix:
        tool:
          - rspec
          - rubocop
        dir:
          - algebra
          - kanban
        include:
          - tool: rubocop
            dir: www
          - tool: jekyll build
            dir: www
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: setup ruby
        uses: ruby/setup-ruby@v1.111.0
        with:
          bundler-cache: true
          ruby-version: '3.1.2'
          working-directory: ${{ matrix.dir }}
      - name: bundle exec ${{matrix.tool}}
        run: |
          cd ${{ matrix.dir }}
          bundle exec ${{matrix.tool}}
      - name: upload public
        uses: actions/upload-artifact@v3
        with:
          if-no-files-found: ignore
          path: '*/public'
  deploy:
    needs:
      - ruby
    #if: ${{github.ref_name == 'main'}}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: downlod public
        uses: actions/download-artifact@v3
        with:
          path: ''
      - name: populate public
        run: |
          cp -r www/public public/www
          touch public/.nojekyll
      - name: deploy public 
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
